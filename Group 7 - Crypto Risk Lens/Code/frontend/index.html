<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crypto-Risk Lens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
      :root {
        color-scheme: light;
        --color-primary: #0f766e;
        --color-primary-light: #14b8a6;
        --color-bg: #F8F9FA;
        --color-card: #FFFFFF;
        --color-border: #E5E7EB;
        --color-text-primary: #111827;
        --color-text-secondary: #6B7280;
        --color-text-muted: #9CA3AF;
      }

      body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background-color: var(--color-bg);
        color: var(--color-text-primary);
      }

      #root {
        min-height: 100vh;
        background-color: var(--color-bg);
      }

      /* Monospaced font for all numeric values */
      .font-mono {
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        font-variant-numeric: tabular-nums;
      }

      .tabular-nums {
        font-variant-numeric: tabular-nums;
      }

      /* Force tabular numerals on all numeric content */
      [class*="font-mono"],
      .indicator-value,
      .stat-value {
        font-variant-numeric: tabular-nums;
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #f1f5f9;
      }
      ::-webkit-scrollbar-thumb {
        background: #cbd5e1;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #94a3b8;
      }

      /* Premium card shadows - no borders */
      .card-shadow {
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.03);
      }

      .card-shadow-hover {
        transition: box-shadow 0.2s ease;
      }

      .card-shadow-hover:hover {
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }

      /* Floating Animation Keyframes */
      /* Premium Animations */
      @keyframes fade-up {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes slide-down {
        from {
          opacity: 0;
          transform: translateY(-20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes reveal-line-1 {
        from {
          opacity: 0;
          transform: translateY(60px) scale(0.95);
          filter: blur(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes reveal-line-2 {
        from {
          opacity: 0;
          transform: translateY(60px) scale(0.95);
          filter: blur(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes reveal-line-3 {
        from {
          opacity: 0;
          transform: translateY(60px) scale(0.95);
          filter: blur(15px);
        }
        to {
          opacity: 1;
          transform: translateY(0) scale(1);
          filter: blur(0);
        }
      }

      @keyframes reveal-line-4 {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes reveal-line-5 {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes reveal-line-6 {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-slide-down {
        animation: slide-down 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
      }

      .animate-reveal-line-1 {
        animation: reveal-line-1 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.1s both;
      }

      .animate-reveal-line-2 {
        animation: reveal-line-2 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.3s both;
      }

      .animate-reveal-line-3 {
        animation: reveal-line-3 1.2s cubic-bezier(0.16, 1, 0.3, 1) 0.5s both;
      }

      .animate-reveal-line-4 {
        animation: reveal-line-4 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.7s both;
      }

      .animate-reveal-line-5 {
        animation: reveal-line-5 0.9s cubic-bezier(0.16, 1, 0.3, 1) 0.9s both;
      }

      .animate-reveal-line-6 {
        animation: reveal-line-6 0.9s cubic-bezier(0.16, 1, 0.3, 1) 1.1s both;
      }

      /* Gradient Animation */
      @keyframes gradient-shift {
        0%, 100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      .animate-gradient-shift {
        background-size: 200% 200%;
        animation: gradient-shift 3s ease infinite;
      }

      /* Floating Animations */
      @keyframes float-slow {
        0%, 100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(30px, -30px) scale(1.1);
        }
      }

      @keyframes float-slower {
        0%, 100% {
          transform: translate(0, 0) scale(1);
        }
        50% {
          transform: translate(-40px, 40px) scale(1.05);
        }
      }

      @keyframes pulse-slow {
        0%, 100% {
          opacity: 0.3;
          transform: scale(1);
        }
        50% {
          opacity: 0.6;
          transform: scale(1.2);
        }
      }

      .animate-float-slow {
        animation: float-slow 20s ease-in-out infinite;
      }

      .animate-float-slower {
        animation: float-slower 25s ease-in-out infinite;
      }

      .animate-pulse-slow {
        animation: pulse-slow 8s ease-in-out infinite;
      }

      /* Particle Animation */
      @keyframes float-particle {
        0%, 100% {
          transform: translate(0, 0);
          opacity: 0.2;
        }
        25% {
          transform: translate(20px, -30px);
          opacity: 0.4;
        }
        50% {
          transform: translate(-15px, -60px);
          opacity: 0.2;
        }
        75% {
          transform: translate(30px, -90px);
          opacity: 0.3;
        }
      }

      /* Premium Marquee */
      @keyframes marquee-premium {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-25%, 0, 0);
        }
      }

      /* Glassmorphism Effects - Enhanced */
      .glass-morphism {
        background: rgba(255, 255, 255, 0.85);
        backdrop-filter: blur(24px) saturate(180%);
        border: 1px solid rgba(255, 255, 255, 0.4);
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      }

      .glass-morphism-subtle {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(16px) saturate(150%);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.03);
      }

      .glass-morphism-card {
        background: rgba(255, 255, 255, 0.92);
        backdrop-filter: blur(28px) saturate(200%);
        box-shadow: 0 12px 48px rgba(0, 0, 0, 0.08);
      }

      /* Custom Cursor - Enhanced */
      .custom-cursor {
        pointer-events: none;
        transition: opacity 0.3s, transform 0.12s cubic-bezier(0.34, 1.56, 0.64, 1);
        will-change: transform;
      }

      body:hover .custom-cursor {
        opacity: 1 !important;
      }

      /* Premium Marquee - Optimized */
      @keyframes marquee-premium {
        0% {
          transform: translate3d(0, 0, 0);
        }
        100% {
          transform: translate3d(-25%, 0, 0);
        }
      }
      /* Gradient Radial */
      .bg-gradient-radial {
        background: radial-gradient(circle, var(--tw-gradient-stops));
      }

      /* Smooth Scrolling */
      html {
        scroll-behavior: smooth;
      }

      /* Selection Color */
      ::selection {
        background-color: rgba(13, 148, 136, 0.2);
        color: #0f172a;
      }

      /* Performance Optimizations */
      * {
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Hardware Acceleration */
      .animate-float-slow,
      .animate-float-slower,
      .animate-pulse-slow,
      .custom-cursor {
        will-change: transform;
        transform: translateZ(0);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",

    "react-router-dom": "https://esm.sh/react-router-dom@^7.13.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "recharts": "https://esm.sh/recharts@^3.7.0",
    "d3": "https://esm.sh/d3@^7.9.0"
  }
}
</script>
</head>

    <div id="root"></div>
  <script type="module" src="/src/index.tsx"></script>
</body>
</html>
